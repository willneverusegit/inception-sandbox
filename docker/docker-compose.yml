version: "3.8"

services:
  # Claude Code agent — planner, reviewer, orchestrator
  claude:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inception-claude
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - shared-workspace:/workspace
      - ../output:/output
    working_dir: /workspace
    stdin_open: true
    tty: true
    entrypoint: >
      bash -c "
        tmux new-session -d -s agent -x 200 -y 50 &&
        tail -f /dev/null
      "
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  # OpenAI Codex agent — autonomous implementer, code churn worker
  codex:
    build:
      context: .
      dockerfile: Dockerfile.codex
    container_name: inception-codex
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - shared-workspace:/workspace
      - ../output:/output
    working_dir: /workspace
    stdin_open: true
    tty: true
    entrypoint: >
      bash -c "
        tmux new-session -d -s agent -x 200 -y 50 &&
        tail -f /dev/null
      "
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

volumes:
  # Shared workspace so both agents see the same repo
  shared-workspace:
