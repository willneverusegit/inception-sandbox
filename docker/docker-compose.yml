version: "3.8"

services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inception-sandbox
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Optional: additional model APIs
      # - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      # Shared output directory — only way data leaves the container
      - ../output:/output
      # Optional: mount a project to work on (read-only from host)
      # - ../workspace:/workspace:ro
    working_dir: /workspace
    stdin_open: true
    tty: true
    # Start tmux session on boot
    entrypoint: >
      bash -c "
        tmux new-session -d -s agent -x 200 -y 50 &&
        tail -f /dev/null
      "
    # Resource limits to prevent runaway processes
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
